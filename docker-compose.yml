services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: zeotap
      POSTGRES_PASSWORD: zeotap123
      POSTGRES_DB: ims
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zeotap"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ims_network

  mongodb:
    image: mongo:6
    environment:
      MONGO_INITDB_ROOT_USERNAME: zeotap
      MONGO_INITDB_ROOT_PASSWORD: zeotap123
      MONGO_INITDB_DATABASE: ims
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ims_network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ims_network

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: zeotap
      POSTGRES_PASSWORD: zeotap123
      POSTGRES_DB: ims
      MONGO_HOST: mongodb
      MONGO_PORT: 27017
      MONGO_USER: zeotap
      MONGO_PASSWORD: zeotap123
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    networks:
      - ims_network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_started
    networks:
      - ims_network

networks:
  ims_network:
    driver: bridge

volumes:
  postgres_data:
  mongo_data:
  redis_data: